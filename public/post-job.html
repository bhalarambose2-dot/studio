<!DOCTYPE html>
<html>
<head>
  <title>Post Job</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>📢 Post a Job</h2>

<input id="title" placeholder="Job Title"><br><br>
<input id="company" placeholder="Company"><br><br>
<input id="location" placeholder="Location"><br><br>
<input id="salary" placeholder="Salary"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>

<button onclick="postJob()">Post Job</button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC2MPagJSfgitEdpr_jKJ073MKLd7jjSNc",
  authDomain: "br-trip.firebaseapp.com",
  projectId: "br-trip",
  storageBucket: "br-trip.firebasestorage.app",
  messagingSenderId: "477570603875",
  appId: "1:477570603875:web:f371ec9a017f97f696d156"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function postJob() {
  await db.collection("jobs").add({
    title: title.value,
    company: company.value,
    location: location.value,
    salary: salary.value,
    description: desc.value,
    createdAt: new Date()
  });

  alert("✅ Job Posted");
}
</script>

</body>
</html>
