<!DOCTYPE html>
<html>
<head>
  <title>Post Job</title>
</head>

<body>

<h2>Post Job</h2>

<input id="title" placeholder="Title"><br><br>
<input id="company" placeholder="Company"><br><br>
<input id="location" placeholder="Location"><br><br>
<input id="salary" placeholder="Salary"><br><br>
<textarea id="desc"></textarea><br><br>

<button onclick="postJob()">Post</button>

<script src="firebase.js"></script>

<script>
async function postJob() {
  const user = auth.currentUser;

  if (!user) return alert("Login first");

  await db.collection("jobs").add({
    title: title.value,
    company: company.value,
    location: location.value,
    salary: salary.value,
    description: desc.value,
    createdAt: new Date()
  });

  alert("Job Posted ✅");
}
</script>

</body>
</html>
