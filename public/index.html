<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALORA Auth</title>

<!-- Firebase OLD -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #001f3f, #003366);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Glass Card */
.card {
  width: 340px;
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  color: white;
  text-align: center;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.logo {
  font-size: 28px;
  font-weight: bold;
}

.subtitle {
  font-size: 12px;
  margin-bottom: 20px;
  opacity: 0.8;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

input::placeholder {
  color: #ddd;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn-primary {
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
}

.btn-primary:hover {
  transform: scale(1.05);
}

.btn-secondary {
  background: transparent;
  border: 1px solid #fff;
  color: white;
}

.logout {
  margin-top: 15px;
  font-size: 14px;
  cursor: pointer;
  color: #ffcc00;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">HALORA ✨</div>
  <div class="subtitle">Sahi Safar • Sahi Nivesh</div>

  <input type="text" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button class="btn-primary" onclick="signup()">Create Account</button>
  <button class="btn-secondary" onclick="login()">Sign In</button>

  <div class="logout" onclick="logout()">Logout</div>
</div>

<script>
var firebaseConfig = {
   apiKey: "AIzaSyC2MPagJSfgitEdpr_jKJ073MKLd7jjSNc",
   authDomain: "br-trip.firebaseapp.com",
   databaseURL: "https://br-trip-default-rtdb.firebaseio.com",
   projectId: "br-trip",
   storageBucket: "br-trip.firebasestorage.app",
   messagingSenderId: "477570603875",
   appId: "1:477570603875:web:f371ec9a017f97f696d156",
   measurementId: "G-PJSNT1Q1LL
};

firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();

// Signup
function signup() {
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Account Created 🚀"))
    .catch(err => alert(err.message));
}

// Login
function login() {
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => alert("Welcome Back 😎"))
    .catch(err => alert(err.message));
}

// Logout
function logout() {
  auth.signOut();
  alert("Logged Out");
}
</script>

</body>
</html>
