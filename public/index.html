<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HALORA Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom, #001f3f, #003366);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      color: #000;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
    }

    h2 {
      color: #0052cc;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0052cc;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      font-weight: bold;
    }

    .switch {
      margin-top: 10px;
      cursor: pointer;
      color: blue;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>HALORA ✨</h2>
  <p>Sahi Safar • Sahi Nivesh</p>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signup()">Create Account</button>
  <button onclick="login()">Sign In</button>

  <p class="switch" onclick="logout()">Logout</p>
</div>

<script>
  // 🔥 Firebase Config (yahan apna config daalo)
  const firebaseConfig = {
   apiKey: "AIzaSyC2MPagJSfgitEdpr_jKJ073MKLd7jjSNc",
   authDomain: "br-trip.firebaseapp.com",
   databaseURL: "https://br-trip-default-rtdb.firebaseio.com",
   projectId: "br-trip",
   storageBucket: "br-trip.firebasestorage.app",
   messagingSenderId: "477570603875",
   appId: "1:477570603875:web:f371ec9a017f97f696d156",
   measurementId: "G-PJSNT1Q1LL" };

  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Signup
  function signup() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        alert("Account Created ✅");
      })
      .catch(err => alert(err.message));
  }

  // Login
  function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        alert("Login Success 🚀");
      })
      .catch(err => alert(err.message));
  }

  // Logout
  function logout() {
    auth.signOut();
    alert("Logged Out");
  }
</script>

</body>
</html>
