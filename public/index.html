<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HALORA Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
    }

    h2 {
      text-align: center;
      color: yellow;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .login { background: yellow; color: black; }
    .signup { background: green; color: black; }
    .otp { background: blue; color: white; }

  </style>
</head>
<body>

<div class="box">
  <h2>HALORA</h2>

  <!-- LOGIN -->
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button class="login" onclick="login()">Login</button>

  <!-- SIGNUP -->
  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button class="signup" onclick="signup()">Signup</button>

  <!-- OTP -->
  <input id="phone" placeholder="Phone / Email">
  <button class="otp" onclick="sendOTP()">Send OTP</button>
  <input id="otpInput" placeholder="Enter OTP">
  <button class="otp" onclick="verifyOTP()">Verify OTP</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
  // 🔥 Firebase config (apna daalo)
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID",
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  // LOGIN
  function login() {
    const email = document.getElementById("loginEmail").value;
    const pass = document.getElementById("loginPass").value;

    auth.signInWithEmailAndPassword(email, pass)
      .then(() => {
        alert("Login Success");
        window.location = "home.html";
      })
      .catch(err => alert(err.message));
  }

  // SIGNUP
  function signup() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;

    auth.createUserWithEmailAndPassword(email, pass)
      .then((user) => {
        db.collection("users").doc(user.user.uid).set({
          name: name,
          email: email,
          wallet: 0
        });

        alert("Signup Success");
      })
      .catch(err => alert(err.message));
  }

  // OTP DEMO
  let generatedOTP = "";

  function sendOTP() {
    generatedOTP = Math.floor(100000 + Math.random() * 900000);
    alert("OTP: " + generatedOTP); // demo only
  }

  function verifyOTP() {
    const input = document.getElementById("otpInput").value;

    if (input == generatedOTP) {
      alert("OTP Verified");
      window.location = "home.html";
    } else {
      alert("Wrong OTP");
    }
  }
</script>

</body>
</html>
