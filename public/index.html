<!DOCTYPE html>
<html>
<head>
  <title>Halora Jobs</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; background:#f5f5f5; }
    .job {
      background:#fff;
      padding:15px;
      margin:10px;
      border-radius:10px;
      box-shadow:0 0 5px rgba(0,0,0,0.1);
    }
    button {
      background:green;
      color:white;
      border:none;
      padding:8px 12px;
      border-radius:5px;
    }
  </style>
</head>

<body>

<h2>🔥 Latest Jobs</h2>
<a href="post-job.html">➕ Post Job</a>

<div id="jobs"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC2MPagJSfgitEdpr_jKJ073MKLd7jjSNc",
  authDomain: "br-trip.firebaseapp.com",
  projectId: "br-trip",
  storageBucket: "br-trip.firebasestorage.app",
  messagingSenderId: "477570603875",
  appId: "1:477570603875:web:f371ec9a017f97f696d156"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loadJobs() {
  const snapshot = await db.collection("jobs").get();
  let html = "";

  snapshot.forEach(doc => {
    const job = doc.data();

    html += `
      <div class="job">
        <h3>${job.title}</h3>
        <p>${job.company} | ${job.location}</p>
        <p>💰 Salary: ₹${job.salary}</p>
        <button onclick="applyJob('${doc.id}')">Apply Now</button>
      </div>
    `;
  });

  document.getElementById("jobs").innerHTML = html;
}

async function applyJob(jobId) {
  const name = prompt("Enter your name");
  const phone = prompt("Enter your phone");

  if(!name || !phone) return alert("Fill all details");

  await db.collection("applications").add({
    jobId,
    name,
    phone,
    status: "pending",
    createdAt: new Date()
  });

  alert("✅ Applied Successfully");
}

loadJobs();
</script>

</body>
</html>
