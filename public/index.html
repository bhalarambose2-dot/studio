<!DOCTYPE html>
<html>
<head>
  <title>Jobs</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">💼 Halora Jobs</div>

<div class="container">
  <a href="post-job.html">➕ Post Job</a>
  <div id="jobs"></div>
</div>

<script src="firebase.js"></script>

<script>
async function loadJobs() {
  const snap = await db.collection("jobs").get();
  let html = "";

  snap.forEach(doc => {
    const j = doc.data();

    html += `
      <div class="job-card">
        <div class="job-title">${j.title}</div>
        <div class="company">${j.company} • ${j.location}</div>
        <div class="salary">₹${j.salary}</div>

        <input type="file" id="file-${doc.id}">
        <button class="apply-btn" onclick="apply('${doc.id}')">
          Apply Now
        </button>
      </div>
    `;
  });

  document.getElementById("jobs").innerHTML = html;
}

loadJobs();
</script>

</body>
</html>
