<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALORA Travel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #0a3d62;
  color: white;
}

.navbar h2 {
  margin: 0;
}

/* Hero */
.hero {
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  font-weight: bold;
}

/* Search */
.search-box {
  margin: -30px auto;
  width: 90%;
  background: white;
  padding: 10px;
  border-radius: 30px;
  display: flex;
}

.search-box input {
  flex: 1;
  border: none;
  outline: none;
  padding: 10px;
}

.search-box button {
  background: #0a3d62;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
}

/* Cards */
.section {
  padding: 20px;
}

.cards {
  display: flex;
  gap: 15px;
  overflow-x: auto;
}

.card {
  min-width: 200px;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.card-text {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: white;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="navbar">
  <h2>HALORA</h2>
  <button>Login</button>
</div>

<div class="hero">
  Explore the World 🌍
</div>

<div class="search-box">
  <input type="text" placeholder="Search destinations...">
  <button>Search</button>
</div>

<div class="section">
  <h2>Trending Destinations</h2>

  <div class="cards">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a">
      <div class="card-text">Europe ₹1,20,000</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1549692520-acc6669e2f0c">
      <div class="card-text">Japan ₹2,50,000</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1508962914676-134849a727f0">
      <div class="card-text">Singapore ₹80,000</div>
    </div>

  </div>
</div>

</body>
</html>
