<!DOCTYPE html>
<html>
<head>
  <title>Jobs</title>
</head>

<body>

<h2>🔥 Jobs</h2>
<a href="post-job.html">➕ Post Job</a>

<div id="jobs"></div>

<script src="firebase.js"></script>

<script>
async function loadJobs() {
  const snap = await db.collection("jobs").get();
  let html = "";

  snap.forEach(doc => {
    const j = doc.data();

    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>${j.title}</h3>
        <p>${j.company} | ${j.location}</p>
        <p>₹${j.salary}</p>
        <input type="file" id="file-${doc.id}">
        <button onclick="apply('${doc.id}')">Apply</button>
      </div>
    `;
  });

  document.getElementById("jobs").innerHTML = html;
}

async function apply(jobId) {
  const name = prompt("Name");
  const phone = prompt("Phone");

  const file = document.getElementById(`file-${jobId}`).files[0];

  let url = "";

  if (file) {
    const ref = storage.ref("resumes/" + file.name);
    await ref.put(file);
    url = await ref.getDownloadURL();
  }

  await db.collection("applications").add({
    jobId,
    name,
    phone,
    resume: url,
    createdAt: new Date()
  });

  alert("Applied ✅");
}

loadJobs();
</script>

</body>
</html>
