<!DOCTYPE html>
<html>
<head>
  <title>Apply Job</title>
</head>
<body>

<h2>📝 Apply Job - HALORA</h2>

<input type="text" id="name" placeholder="Full Name"><br><br>
<input type="text" id="mobile" placeholder="Mobile Number"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>

<input type="text" id="aadhar" placeholder="Aadhar Number"><br><br>
<input type="text" id="pan" placeholder="PAN Number"><br><br>

<select id="gender">
  <option>Male</option>
  <option>Female</option>
</select><br><br>

<button onclick="submitForm()">Submit</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase.js"></script>

<script>
function submitForm() {

  db.collection("applications").add({
    name: name.value,
    mobile: mobile.value,
    email: email.value,
    aadhar: aadhar.value,
    pan: pan.value,
    gender: gender.value,
    time: new Date()
  });

  alert("✅ Application Submitted");
}
</script>

</body>
</html>
