<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HALORA Admin</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="header">
    <div class="logo">HALORA Admin</div>
    <button class="btn" onclick="logout()">Logout</button>
  </header>

  <section class="dashboard-wrap">
    <div class="card">
      <h2>Admin Panel</h2>
      <p>Only admin can access this page.</p>
    </div>

    <div class="card">
      <h3>Users</h3>
      <div id="usersList">Loading users...</div>
    </div>

    <div class="card">
      <h3>Proof Uploads</h3>
      <div id="proofsList">Loading proofs...</div>
    </div>
  </section>

  <script type="module" src="admin.js"></script>
</body>
</html>
