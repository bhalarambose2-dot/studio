<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - HALORA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 92%;
      max-width: 430px;
      background: #0d0d0d;
      padding: 28px;
      border-radius: 28px;
      box-shadow: 0 0 25px rgba(255, 102, 0, 0.12);
    }
    h2 {
      text-align: center;
      color: #ff6600;
      margin-bottom: 28px;
      font-size: 34px;
    }
    input {
      width: 100%;
      padding: 18px;
      margin-bottom: 18px;
      border: none;
      border-radius: 18px;
      font-size: 17px;
      outline: none;
      background: #e9edf5;
      color: #111;
    }
    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: #ff6600;
      color: white;
      font-size: 22px;
      cursor: pointer;
      font-weight: bold;
    }
    p {
      text-align: center;
      margin-top: 22px;
      font-size: 16px;
    }
    a {
      color: #ff6600;
      font-weight: bold;
    }
    #status {
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
      color: #ffb380;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Enter Email" />
    <input type="password" id="password" placeholder="Enter Password" />

    <button id="loginBtn">Login</button>

    <div id="status"></div>

    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC2MPagJSfgitEdpr_jKJ073MKLd7jjSNc",
      authDomain: "br-trip.firebaseapp.com",
      databaseURL: "https://br-trip-default-rtdb.firebaseio.com",
      projectId: "br-trip",
      storageBucket: "br-trip.firebasestorage.app",
      messagingSenderId: "477570603875",
      appId: "1:477570603875:web:f371ec9a017f97f696d156",
      measurementId: "G-PJSNT1Q1LL"
    };

    firebase.initializeApp(firebaseConfig);

    const loginBtn = document.getElementById("loginBtn");
    const statusBox = document.getElementById("status");

    firebase.auth().onAuthStateChanged(function(user) {
      if (user) {
        window.location.href = "dashboard.html";
      }
    });

    loginBtn.addEventListener("click", function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        statusBox.innerText = "Please enter email and password.";
        return;
      }

      statusBox.innerText = "Logging in...";

      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(() => {
          statusBox.innerText = "Login successful! Redirecting...";
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1000);
        })
        .catch((error) => {
          statusBox.innerText = error.message;
        });
    });
  </script>

</body>
</html>
